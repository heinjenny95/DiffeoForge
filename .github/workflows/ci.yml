name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,sbom-builder]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Build distributions
        run: python -m build

      - name: Verify wheel contents
        run: python tools/verify_wheel.py dist/*.whl

  modern-engine:
    name: Modern engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install modern engine and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,modern-engine]"

      - name: Test modern engine
        run: >-
          pytest tests/test_modern_engine.py tests/test_atlas_objective.py
          tests/test_blockwise_engine.py
          tests/test_momenta_optimizer.py tests/test_atlas_optimizer.py
          tests/test_procrustes.py tests/test_pca.py
          tests/test_pca_visualization.py tests/test_modern_bundle.py
          tests/test_modern_workflow.py tests/test_mesh_quality.py
          tests/test_modern_workload.py tests/test_modern_progress.py
          tests/test_modern_benchmark.py tests/test_desktop_project_setup.py
          tests/test_desktop_project_review.py tests/test_desktop_worker.py
          tests/test_desktop_worker_controller.py tests/test_desktop_reviewed_run.py
          tests/test_desktop_result_review.py

  desktop:
    name: Desktop smoke (Windows)
    runs-on: windows-latest
    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install desktop and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,desktop]"

      - name: Test desktop setup, review, compute, and result screens
        run: >-
          pytest tests/test_desktop_app.py tests/test_desktop_project_setup.py
          tests/test_desktop_project_review.py tests/test_desktop_reviewed_run.py
          tests/test_desktop_worker_controller.py tests/test_windows_parent_death.py
          tests/test_desktop_reference_preparation_request.py
          tests/test_desktop_reference_preparation_worker_protocol.py
          tests/test_desktop_reference_preparation_worker_harness.py
          tests/test_desktop_reference_preparation_worker_controller.py
