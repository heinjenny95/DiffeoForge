name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Build distributions
        run: python -m build

  modern-engine:
    name: Modern engine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: pip

      - name: Install modern engine and test tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,modern-engine]"

      - name: Test modern engine
        run: >-
          pytest tests/test_modern_engine.py tests/test_atlas_objective.py
          tests/test_blockwise_engine.py
          tests/test_momenta_optimizer.py tests/test_atlas_optimizer.py
          tests/test_procrustes.py tests/test_pca.py
          tests/test_pca_visualization.py tests/test_modern_bundle.py
          tests/test_modern_workflow.py tests/test_mesh_quality.py
          tests/test_modern_workload.py tests/test_modern_progress.py
          tests/test_modern_benchmark.py
