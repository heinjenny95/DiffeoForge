name: Reference container

on:
  pull_request:
    paths:
      - ".github/workflows/reference-container.yml"
      - ".dockerignore"
      - "container/**"
      - "examples/minimal-atlas-container.yaml"
      - "reference/synthetic-v1/**"
      - "src/diffeoforge/backends/**"
      - "src/diffeoforge/runs.py"
      - "src/diffeoforge/schema/atlas-config-v0.1.json"
  push:
    branches: [main]
    paths:
      - ".github/workflows/reference-container.yml"
      - ".dockerignore"
      - "container/**"
      - "examples/minimal-atlas-container.yaml"
      - "reference/synthetic-v1/**"
      - "src/diffeoforge/backends/**"
      - "src/diffeoforge/runs.py"
      - "src/diffeoforge/schema/atlas-config-v0.1.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-run-compare:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up modern host Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.11"
          cache: pip

      - name: Install DiffeoForge host tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Build frozen CPU image
        run: |
          docker build \
            --platform linux/amd64 \
            --file container/Dockerfile \
            --tag diffeoforge-deformetrica:4.3.0-cpu .

      - name: Verify frozen versions and CPU isolation
        run: |
          docker run --rm --entrypoint python \
            diffeoforge-deformetrica:4.3.0-cpu \
            -c "import importlib.metadata as m, torch; assert m.version('deformetrica') == '4.3.0'; assert torch.__version__ == '1.6.0+cpu'; assert not torch.cuda.is_available()"

      - name: Execute public synthetic atlas
        run: |
          diffeoforge run examples/minimal-atlas-container.yaml \
            --run-id container-ci

      - name: Compare numerical reference
        run: |
          diffeoforge compare-reference \
            examples/runs/container-ci reference/synthetic-v1
